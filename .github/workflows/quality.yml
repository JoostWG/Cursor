name: Quality

on:
  push:
    paths:
      - src/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - eslint.config.mjs
      - dprint.jsonc
      - cspell.json
      - config.json
      - .github/workflows/quality.yml

jobs:
  ESLint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Copy config
        run: cp example.config.json config.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings=0

  dprint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run dprint
        run: npx dprint check

  TypeScript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Copy config
        run: cp example.config.json config.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript
        run: npx tsc --noEmit

  CSpell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run CSpell
        uses: streetsidesoftware/cspell-action@v8

  Security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run npm audit
        run: npm audit
